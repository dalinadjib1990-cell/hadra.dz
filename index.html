<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ Teach</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: white;
        }
        
        /* شاشة التحميل */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        /* صفحة تسجيل الدخول */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            padding: 20px;
        }
        
        .auth-card {
            background: #111;
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            border: 1px solid #8b5cf6;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }
        
        .auth-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #8b5cf6;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #1a1a1a;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn-google {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: none;
            border-radius: 12px;
            color: #888;
            cursor: pointer;
        }
        
        .tab-btn.active {
            background: #8b5cf6;
            color: white;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        /* الصفحة الرئيسية */
        .app-page {
            display: none;
            min-height: 100vh;
            background: #0a0a0a;
        }
        
        .navbar {
            background: #111;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
        }
        
        .nav-brand {
            font-size: 24px;
            font-weight: bold;
            color: #8b5cf6;
        }
        
        .nav-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .container {
            display: flex;
            max-width: 1200px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 20px;
        }
        
        .sidebar {
            flex: 1;
        }
        
        .main {
            flex: 2;
        }
        
        .profile-card {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        
        .create-post {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        
        .create-post textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #1a1a1a;
            color: white;
            resize: none;
            font-family: 'Cairo', sans-serif;
        }
        
        .post-card {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        
        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        
        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #222;
        }
        
        .post-stats button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
        }
        
        .online-list {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #222;
        }
        
        .online-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        button {
            cursor: pointer;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 70%;
        }
        
        .message.sent {
            background: #8b5cf6;
            align-self: flex-end;
            margin-right: auto;
        }
        
        .message.received {
            background: #1a1a1a;
            align-self: flex-start;
        }
        
        .chat-window {
            position: fixed;
            bottom: 0;
            right: 20px;
            width: 350px;
            background: #111;
            border-radius: 20px 20px 0 0;
            border: 1px solid #222;
            z-index: 1000;
        }
        
        .chat-header {
            background: #8b5cf6;
            padding: 12px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
        }
        
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #222;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 20px;
            background: #1a1a1a;
            color: white;
        }
        
        .chat-input button {
            padding: 10px 15px;
            background: #8b5cf6;
            border: none;
            border-radius: 20px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<!-- شاشة تحميل -->
<div id="splash">
    <div style="text-align:center">
        <i class="fas fa-chalkboard-user" style="font-size: 60px; color: #8b5cf6;"></i>
        <h2>DZ Teach</h2>
        <div style="width: 30px; height: 30px; border: 3px solid #8b5cf6; border-top-color: transparent; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite;"></div>
    </div>
</div>

<style>
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

<!-- صفحة تسجيل الدخول -->
<div id="authPage" class="auth-page">
    <div class="auth-card">
        <h2><i class="fas fa-chalkboard-user"></i> DZ Teach</h2>
        
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
            <button class="tab-btn" data-tab="register">إنشاء حساب</button>
        </div>
        
        <!-- تسجيل الدخول -->
        <div id="loginForm" class="form active">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
            </div>
            <button id="loginBtn" class="btn-primary">دخول</button>
            <button id="googleLoginBtn" class="btn-google"><i class="fab fa-google"></i> دخول عبر Google</button>
        </div>
        
        <!-- إنشاء حساب -->
        <div id="registerForm" class="form">
            <div class="input-group">
                <input type="text" id="regName" placeholder="الاسم الكامل">
            </div>
            <div class="input-group">
                <select id="regSpecialty">
                    <option value="">الاختصاص</option>
                    <option value="رياضيات">رياضيات</option>
                    <option value="علوم طبيعية">علوم طبيعية</option>
                    <option value="فيزياء">فيزياء</option>
                    <option value="لغة عربية">لغة عربية</option>
                </select>
            </div>
            <div class="input-group">
                <select id="regLevel">
                    <option value="">الطور</option>
                    <option value="ابتدائي">ابتدائي</option>
                    <option value="متوسط">متوسط</option>
                    <option value="ثانوي">ثانوي</option>
                </select>
            </div>
            <div class="input-group">
                <select id="regWilaya">
                    <option value="">الولاية</option>
                    <option value="الجزائر">الجزائر</option>
                    <option value="وهران">وهران</option>
                    <option value="قسنطينة">قسنطينة</option>
                </select>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="كلمة المرور">
            </div>
            <button id="registerBtn" class="btn-primary">إنشاء حساب</button>
        </div>
    </div>
</div>

<!-- الصفحة الرئيسية -->
<div id="appPage" class="app-page">
    <div class="navbar">
        <div class="nav-brand">DZ Teach</div>
        <div class="profile-menu" style="position: relative;">
            <img id="navAvatar" class="nav-avatar" src="https://via.placeholder.com/40">
            <div id="dropdown" style="position: absolute; top: 50px; right: 0; background: #111; border: 1px solid #222; border-radius: 12px; display: none; width: 150px;">
                <button id="logoutBtn" style="padding: 10px; width: 100%; background: none; border: none; color: white; text-align: right;">تسجيل خروج</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="profile-card">
                <img id="profileAvatar" class="profile-avatar" src="https://via.placeholder.com/100">
                <h3 id="profileName"></h3>
                <p id="profileSpecialty"></p>
            </div>
            <div class="online-list">
                <h4>متصلون الآن</h4>
                <div id="onlineUsers"></div>
            </div>
        </div>
        
        <div class="main">
            <div class="create-post">
                <textarea id="postText" rows="3" placeholder="ماذا تريد أن تشارك؟"></textarea>
                <button id="publishBtn" class="btn-primary" style="margin-top: 10px;">نشر</button>
            </div>
            <div id="postsList"></div>
        </div>
    </div>
    
    <!-- نافذة المحادثة -->
    <div id="chatWindow" class="chat-window hidden">
        <div class="chat-header">
            <span id="chatUserName"></span>
            <button id="closeChat" style="background: none; border: none; color: white;">✕</button>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="اكتب رسالة...">
            <button id="sendChatBtn">إرسال</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, updateProfile } from "firebase/auth";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, updateDoc, arrayUnion, where, getDocs } from "firebase/firestore";

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDg_T6I4mksgG1mgxTnhQI0DA4MhBYGDqU",
        authDomain: "hadra-dz.firebaseapp.com",
        projectId: "hadra-dz",
        storageBucket: "hadra-dz.appspot.com",
        messagingSenderId: "765723444730",
        appId: "1:765723444730:web:4d816875f8e8a45f939043"
    };

    // Initialize
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let currentChatUser = null;
    let messagesUnsub = null;

    // إخفاء شاشة التحميل
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
    }, 1000);

    // تبديل التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.getElementById(btn.dataset.tab + 'Form').classList.add('active');
        });
    });

    // تسجيل الدخول
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (e) {
            alert('خطأ: ' + e.message);
        }
    });

    // تسجيل عبر Google
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const user = result.user;
            const userRef = doc(db, 'users', user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    uid: user.uid,
                    fullName: user.displayName || user.email,
                    email: user.email,
                    avatar: user.photoURL || 'https://via.placeholder.com/100',
                    specialty: 'غير محدد',
                    level: 'غير محدد',
                    wilaya: 'غير محدد',
                    online: true,
                    createdAt: serverTimestamp()
                });
            } else {
                await updateDoc(userRef, { online: true });
            }
        } catch (e) {
            alert('خطأ: ' + e.message);
        }
    });

    // إنشاء حساب
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const fullName = document.getElementById('regName').value;
        const specialty = document.getElementById('regSpecialty').value;
        const level = document.getElementById('regLevel').value;
        const wilaya = document.getElementById('regWilaya').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;

        if (!fullName || !specialty || !level || !wilaya || !email || !password) {
            alert('الرجاء ملء جميع الحقول');
            return;
        }

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCred.user;
            await updateProfile(user, { displayName: fullName });
            await setDoc(doc(db, 'users', user.uid), {
                uid: user.uid,
                fullName: fullName,
                email: email,
                avatar: `https://ui-avatars.com/api/?background=8b5cf6&color=fff&size=100&name=${fullName}`,
                specialty: specialty,
                level: level,
                wilaya: wilaya,
                online: true,
                createdAt: serverTimestamp()
            });
            alert('تم إنشاء الحساب بنجاح!');
        } catch (e) {
            alert('خطأ: ' + e.message);
        }
    });

    // حالة المستخدم
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            
            // جلب بيانات المستخدم
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('profileName').innerText = data.fullName;
                document.getElementById('profileSpecialty').innerText = data.specialty;
                document.getElementById('profileAvatar').src = data.avatar;
                document.getElementById('navAvatar').src = data.avatar;
            }
            
            await updateDoc(doc(db, 'users', user.uid), { online: true });
            
            // تحميل المنشورات
            loadPosts();
            // تحميل المستخدمين المتصلين
            loadOnlineUsers();
            
        } else {
            currentUser = null;
            document.getElementById('authPage').style.display = 'flex';
            document.getElementById('appPage').style.display = 'none';
        }
    });

    // تحميل المنشورات
    async function loadPosts() {
        const q = query(collection(db, 'posts'), orderBy('timestamp', 'desc'));
        onSnapshot(q, async (snapshot) => {
            const postsDiv = document.getElementById('postsList');
            postsDiv.innerHTML = '';
            
            for (const docSnap of snapshot.docs) {
                const post = docSnap.data();
                const userDoc = await getDoc(doc(db, 'users', post.userId));
                const userName = userDoc.exists() ? userDoc.data().fullName : 'مستخدم';
                const userAvatar = userDoc.exists() ? userDoc.data().avatar : 'https://via.placeholder.com/50';
                
                const postDiv = document.createElement('div');
                postDiv.className = 'post-card';
                postDiv.innerHTML = `
                    <div class="post-header">
                        <img class="post-avatar" src="${userAvatar}">
                        <div>
                            <strong>${userName}</strong><br>
                            <small style="color:#888">${post.timestamp ? new Date(post.timestamp.toDate()).toLocaleString('ar-DZ') : 'الآن'}</small>
                        </div>
                    </div>
                    <p>${post.text}</p>
                    <div class="post-stats">
                        <button class="like-btn" data-id="${docSnap.id}"><i class="fas fa-heart"></i> ${post.likes?.length || 0}</button>
                    </div>
                `;
                postsDiv.appendChild(postDiv);
            }
            
            // إضافة حدث الإعجاب
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const postId = btn.dataset.id;
                    const postRef = doc(db, 'posts', postId);
                    const postDoc = await getDoc(postRef);
                    const postData = postDoc.data();
                    if (postData.likes?.includes(currentUser.uid)) {
                        await updateDoc(postRef, { likes: arrayRemove(currentUser.uid) });
                    } else {
                        await updateDoc(postRef, { likes: arrayUnion(currentUser.uid) });
                    }
                });
            });
        });
    }

    // نشر منشور
    document.getElementById('publishBtn').addEventListener('click', async () => {
        const text = document.getElementById('postText').value.trim();
        if (!text) {
            alert('اكتب شيئاً للنشر');
            return;
        }
        try {
            await addDoc(collection(db, 'posts'), {
                userId: currentUser.uid,
                text: text,
                timestamp: serverTimestamp(),
                likes: []
            });
            document.getElementById('postText').value = '';
            alert('تم النشر!');
        } catch (e) {
            alert('خطأ: ' + e.message);
        }
    });

    // تحميل المستخدمين المتصلين
    async function loadOnlineUsers() {
        const q = query(collection(db, 'users'), where('online', '==', true));
        onSnapshot(q, (snapshot) => {
            const onlineDiv = document.getElementById('onlineUsers');
            onlineDiv.innerHTML = '';
            snapshot.forEach((doc) => {
                const user = doc.data();
                if (user.uid !== currentUser?.uid) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'online-item';
                    userDiv.innerHTML = `
                        <img src="${user.avatar}" style="width: 40px; height: 40px; border-radius: 50%;">
                        <div>
                            <div>${user.fullName}</div>
                            <small style="color:#8b5cf6">● متصل</small>
                        </div>
                    `;
                    userDiv.onclick = () => openChat(user);
                    onlineDiv.appendChild(userDiv);
                }
            });
        });
    }

    // فتح المحادثة
    function openChat(user) {
        currentChatUser = user;
        const chatWindow = document.getElementById('chatWindow');
        const chatUserName = document.getElementById('chatUserName');
        chatUserName.innerText = user.fullName;
        chatWindow.classList.remove('hidden');
        
        // تحميل الرسائل
        const chatId = [currentUser.uid, user.uid].sort().join('_');
        if (messagesUnsub) messagesUnsub();
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        messagesUnsub = onSnapshot(q, (snapshot) => {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = '';
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                msgDiv.innerText = msg.text;
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    }
    
    // إرسال رسالة
    document.getElementById('sendChatBtn').addEventListener('click', async () => {
        if (!currentChatUser) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        const chatId = [currentUser.uid, currentChatUser.uid].sort().join('_');
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
            senderId: currentUser.uid,
            text: text,
            timestamp: serverTimestamp()
        });
        input.value = '';
    });
    
    document.getElementById('closeChat').addEventListener('click', () => {
        document.getElementById('chatWindow').classList.add('hidden');
        if (messagesUnsub) messagesUnsub();
        currentChatUser = null;
    });
    
    // تسجيل الخروج
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        if (currentUser) {
            await updateDoc(doc(db, 'users', currentUser.uid), { online: false });
        }
        await signOut(auth);
    });
    
    // قائمة الملف الشخصي
    document.querySelector('.profile-menu').addEventListener('click', () => {
        const dropdown = document.getElementById('dropdown');
        dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    });
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.profile-menu')) {
            document.getElementById('dropdown').style.display = 'none';
        }
    });
    
    console.log('✅ DZ Teach يعمل!');
</script>
</body>
