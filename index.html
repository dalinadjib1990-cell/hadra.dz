<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>DZ Teach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- تسجيل -->
<div id="login-div" class="card">
  <h2>تسجيل الدخول / إنشاء حساب</h2>

  <input id="name" placeholder="الاسم">
  <input id="lastname" placeholder="اللقب">
  <input id="wilaya" placeholder="الولاية">
  <input id="subject" placeholder="التخصص">
  <input id="level" placeholder="الطور">
  <input id="school" placeholder="المؤسسة">

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="signup-btn">إنشاء حساب</button>
  <button id="login-btn">تسجيل الدخول</button>
</div>

<!-- التطبيق -->
<div id="app" class="hidden">

  <div class="header">
    <h2>DZ Teach</h2>
    <button id="logout-btn">خروج</button>
  </div>

  <!-- منشور -->
  <div class="card">
    <input id="post-input" placeholder="اكتب منشور...">
    <button id="post-btn">نشر</button>
  </div>

  <!-- المنشورات -->
  <div id="posts"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
