<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hadra Chat</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase -->
  <script type="module" src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js"></script>
</head>
<body>
  <div class="chat-container">

    <!-- ── Title Bar ── -->
    <div class="win-titlebar">
      <span class="win-title">
        <!-- Classic chat icon (inline SVG) -->
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="14" height="10" rx="1" fill="#c0d8f0" stroke="#000080" stroke-width="1"/>
          <path d="M3 13 L5 11 H13 V11" stroke="#000080" stroke-width="1" fill="none"/>
          <line x1="3" y1="4" x2="13" y2="4" stroke="#000080" stroke-width="1"/>
          <line x1="3" y1="6.5" x2="10" y2="6.5" stroke="#000080" stroke-width="1"/>
          <line x1="3" y1="9" x2="8" y2="9" stroke="#000080" stroke-width="1"/>
        </svg>
        Hadra Chat
      </span>
      <div class="win-controls">
        <div class="win-btn" title="Minimize">_</div>
        <div class="win-btn" title="Maximize">□</div>
        <div class="win-btn" title="Close" style="font-weight:bold;">✕</div>
      </div>
    </div>

    <!-- ── Login Panel ── -->
    <div id="login-div">
      <div class="win-content">
        <div class="win-inset">
          <h2>تسجيل الدخول</h2>

          <label for="email">البريد الإلكتروني:</label>
          <input type="email" id="email" placeholder="user@example.com" autocomplete="username">

          <label for="password">كلمة المرور:</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <hr class="win-divider">

        <button id="login-btn">تسجيل الدخول</button>
        <button id="google-btn">تسجيل الدخول بواسطة Google</button>
      </div>

      <div class="win-statusbar">جاهز</div>
    </div>

    <!-- ── Chat Panel ── -->
    <div id="chat-div" class="hidden">
      <div class="win-content">
        <div id="messages"></div>

        <div class="send-row">
          <input type="text" id="message-input" placeholder="اكتب رسالتك...">
          <button id="send-btn">إرسال</button>
        </div>

        <hr class="win-divider">

        <button id="logout-btn">تسجيل الخروج</button>
      </div>

      <div class="win-statusbar">متصل</div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
