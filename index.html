<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teach DZ</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body>

<div class="header">Teach DZ</div>

<div class="container">

<!-- AUTH -->
<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">تسجيل</button>
<button onclick="login()">دخول</button>
</div>

<!-- PROFILE -->
<div class="card">
<input id="name" placeholder="اسمك">
<input type="file" id="profilePic">
<button onclick="saveProfile()">حفظ البروفايل</button>
</div>

<!-- POST -->
<div class="card">
<input id="postText" placeholder="اكتب منشور">
<input type="file" id="postImage">
<button onclick="addPost()">نشر</button>
</div>

<div id="posts"></div>

<!-- CHAT -->
<div class="chat">
<div id="chatBox"></div>
<input id="chatInput" placeholder="اكتب رسالة">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
